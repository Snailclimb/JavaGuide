<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" style="background-color: #F8FAFC; font-family: system-ui, sans-serif;">
    <defs>
        <pattern id="dot-bg" width="30" height="30" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.2" fill="#E2E8F0" />
        </pattern>
        <filter id="card-shadow">
            <feDropShadow dx="2" dy="8" stdDeviation="10" flood-color="#005D7B" flood-opacity="0.06" />
        </filter>
        <filter id="data-glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="url(#dot-bg)" />
    
    <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#005D7B">Anthropic 三智能体协同架构 (受 GAN 启发)</text>

    <g transform="translate(50, 150)">
        <rect width="200" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)" />
        <rect width="200" height="8" rx="4" fill="#005D7B" />
        <text x="100" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#005D7B">Planner 规划者</text>
        <line x1="20" y1="60" x2="180" y2="60" stroke="#E2E8F0" stroke-width="1" />
        <text x="100" y="85" text-anchor="middle" font-size="13" fill="#64748B">将简短描述扩展为</text>
        <text x="100" y="105" text-anchor="middle" font-size="13" fill="#64748B">完整产品规格</text>
    </g>

    <path d="M 250 220 L 350 220" fill="none" stroke="#4CA497" stroke-width="3" marker-end="url(#arrow-teal)" />
    <circle cx="300" cy="220" r="5" fill="#4CA497" filter="url(#data-glow)" />

    <g transform="translate(350, 150)">
        <rect width="200" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)" />
        <rect width="200" height="8" rx="4" fill="#4CA497" />
        <text x="100" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#005D7B">Generator 执行者</text>
        <line x1="20" y1="60" x2="180" y2="60" stroke="#E2E8F0" stroke-width="1" />
        <text x="100" y="85" text-anchor="middle" font-size="13" fill="#64748B">按功能进行 Sprint 迭代</text>
        <text x="100" y="105" text-anchor="middle" font-size="13" fill="#64748B">生成系统状态产物</text>
    </g>

    <path d="M 550 180 L 650 180" fill="none" stroke="#4CA497" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 650 260 L 550 260" fill="none" stroke="#E99151" stroke-width="2" stroke-dasharray="4,4" />
    <text x="600" y="170" text-anchor="middle" font-size="12" fill="#4CA497">提交产物</text>
    <text x="600" y="285" text-anchor="middle" font-size="12" fill="#E99151">打分与纠偏</text>
    <circle cx="600" cy="260" r="4" fill="#E99151" filter="url(#data-glow)" />

    <g transform="translate(650, 150)">
        <rect width="200" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)" />
        <rect width="200" height="8" rx="4" fill="#005D7B" />
        <text x="100" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#005D7B">Evaluator 评估者</text>
        <line x1="20" y1="60" x2="180" y2="60" stroke="#E2E8F0" stroke-width="1" />
        <text x="100" y="85" text-anchor="middle" font-size="13" fill="#64748B">Playwright 浏览器自动化</text>
        <text x="100" y="105" text-anchor="middle" font-size="13" fill="#64748B">端到端维度验收</text>
    </g>

    <g transform="translate(350, 320)">
        <rect width="200" height="60" rx="6" fill="#FDF3EE" stroke="#E99151" stroke-width="1" stroke-dasharray="4,2" />
        <circle cx="20" cy="30" r="5" fill="#E99151" filter="url(#data-glow)" />
        <text x="35" y="25" font-size="13" font-weight="bold" fill="#E99151">Context Resets 兜底</text>
        <text x="35" y="45" font-size="12" fill="#64748B">上限饱和时清理进程并交接状态</text>
        <line x1="100" y1="0" x2="100" y2="-30" stroke="#E99151" stroke-width="2" marker-end="url(#arrow-orange)"/>
    </g>
</svg>
